name: Publish GHCR image

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

concurrency:
  group: ghcr-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/qmzz/new-api

jobs:
  build:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Resolve image version
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if [ -z "$TAG_NAME" ]; then
            echo "::error::Unable to resolve the tag name"
            exit 1
          fi

          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          printf '%s\n' "$TAG_NAME" > VERSION
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ghcr-multiarch
          cache-to: type=gha,mode=max,scope=ghcr-multiarch
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Publish summary
        run: |
          echo "### Published GHCR image" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
